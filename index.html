<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaxTrack</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: sans-serif; background: #f5f5f5; color: #222; padding: 20px; }
      h1 { text-align: center; margin-bottom: 30px; font-size: 2rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
      .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
      .card h2 { font-size: 1rem; margin-bottom: 10px; color: #555; }
      .score { font-size: 2.5rem; font-weight: bold; color: #2a6496; }
      .bar-bg { background: #eee; border-radius: 10px; height: 10px; margin-top: 10px; }
      .bar { height: 10px; border-radius: 10px; background: #2a6496; }
    </style>
  </head>
  <body>
    <h1>MaxTrack</h1>
    <div class="grid">
      <div class="card">
        <h2>Mind</h2>
        <div class="score">7/10</div>
        <div class="bar-bg"><div class="bar" style="width: 70%"></div></div>
      </div>
      <div class="card">
        <h2>Heart</h2>
        <div class="score">6/10</div>
        <div class="bar-bg"><div class="bar" style="width: 60%"></div></div>
      </div>
      <div class="card">
        <h2>Energy</h2>
        <div class="score">8/10</div>
        <div class="bar-bg"><div class="bar" style="width: 80%"></div></div>
      </div>
      <div class="card">
        <h2>Presence</h2>
        <div class="score">5/10</div>
        <div class="bar-bg"><div class="bar" style="width: 50%"></div></div>
      </div>
      <div class="card">
        <h2>Drive</h2>
        <div class="score">9/10</div>
        <div class="bar-bg"><div class="bar" style="width: 90%"></div></div>
      </div>
    </div>
  </body>
</html>
