<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MaxTrack</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: #1a1a1a;
    color: #ddd;
    padding: 20px;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    font-size: 2.5rem;
    color: #39ff14;
    text-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14;
    letter-spacing: 4px;
    margin-bottom: 25px;
  }

  .score-panel { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
  .score-value { font-size: 3rem; font-weight: bold; color: #39ff14; text-shadow: 0 0 8px #39ff14; }
  .score-label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }

  .pillars { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; max-width: 1100px; margin: 0 auto 35px auto; }
  .pillar-card { background: #232323; border: 1px solid #333; border-radius: 10px; padding: 14px 8px; text-align: center; }
  .pillar-card h3 { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .pillar-card .pillar-score { font-size: 1.6rem; font-weight: bold; color: #39ff14; margin-bottom: 8px; }
  .pillar-buttons { display: flex; justify-content: center; gap: 8px; }
  .pillar-buttons button {
    background: #2a2a2a; border: 1px solid #39ff14; color: #39ff14;
    padding: 5px 10px; border-radius: 6px; cursor: pointer; font-family: inherit;
    font-size: 0.85rem; transition: background 0.2s;
  }
  .pillar-buttons button:hover { background: #39ff14; color: #1a1a1a; }

  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
  .column { background: #232323; border-radius: 10px; padding: 15px; min-height: 400px; }
  .column h2 { color: #39ff14; font-size: 1.1rem; margin-bottom: 12px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
  .column.drag-over { background: #2c3a2c; }

  .card { background: #2e2e2e; border: 1px solid #444; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; cursor: pointer; }
  .card.dragging { opacity: 0.4; }
  .card h3 { font-size: 1rem; color: #fff; margin-bottom: 4px; }
  .card p.desc { font-size: 0.8rem; color: #aaa; margin-bottom: 4px; }
  .card .due { font-size: 0.75rem; color: #39ff14; }
  .card .meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .card .priority-tag, .card .pillar-tag, .card .points-tag {
    display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
  }
  .priority-1 { background: #5c1a1a; color: #ff6b6b; border: 1px solid #ff6b6b; }
  .priority-2 { background: #5c3a1a; color: #ffa94d; border: 1px solid #ffa94d; }
  .priority-3 { background: #1a3a5c; color: #74c0fc; border: 1px solid #74c0fc; }
  .pillar-tag { background: #333; color: #39ff14; border: 1px solid #39ff14; }
  .points-tag { background: #333; color: #ffd84d; border: 1px solid #ffd84d; }

  .card .comments-count { font-size: 0.7rem; color: #888; margin-top: 6px; }
  .card .delete-btn { float: right; color: #888; cursor: pointer; font-size: 0.85rem; }
  .card .delete-btn:hover { color: #ff5050; }

  .add-card-btn {
    width: 100%; background: none; border: 1px dashed #555; color: #888;
    padding: 8px; border-radius: 6px; cursor: pointer; font-family: inherit;
  }
  .add-card-btn:hover { border-color: #39ff14; color: #39ff14; }

  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #232323; border: 1px solid #39ff14; border-radius: 10px;
    padding: 25px; width: 90%; max-width: 420px; max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { color: #39ff14; margin-bottom: 15px; }
  .modal label { font-size: 0.8rem; color: #aaa; display: block; margin-top: 10px; margin-bottom: 4px; }
  .modal input, .modal textarea, .modal select {
    width: 100%; background: #1a1a1a; border: 1px solid #444; color: #ddd;
    padding: 8px; border-radius: 6px; font-family: inherit;
  }
  .modal textarea { resize: vertical; min-height: 50px; }
  .modal-actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 18px; }
  .modal-actions button { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; }
  .btn-cancel { background: #444; color: #ddd; }
  .btn-save { background: #39ff14; color: #1a1a1a; font-weight: bold; }
  .btn-delete-modal { background: #5c1a1a; color: #ff8080; }
</style>
</head>
<body>

<h1>MAXTRACK</h1>

<div class="score-panel">
  <div class="score-value" id="score-value">0</div>
  <div class="score-label">Overall score</div>
</div>

<div class="pillars" id="pillars-container"></div>

<div class="board">
  <div class="column" data-status="todo">
    <h2>To Do</h2>
    <div class="cards-container" id="todo-container"></div>
    <button class="add-card-btn" onclick="openModal('todo')">+ Add card</button>
  </div>
  <div class="column" data-status="inprogress">
    <h2>In Progress</h2>
    <div class="cards-container" id="inprogress-container"></div>
    <button class="add-card-btn" onclick="openModal('inprogress')">+ Add card</button>
  </div>
  <div class="column" data-status="done">
    <h2>Done</h2>
    <div class="cards-container" id="done-container"></div>
    <button class="add-card-btn" onclick="openModal('done')">+ Add card</button>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">New Card</h2>
    <label>Name</label>
    <input type="text" id="card-name" placeholder="Card title">

    <label>Description</label>
    <textarea id="card-desc" placeholder="Details about this goal..."></textarea>

    <label>Due date</label>
    <input type="date" id="card-due">

    <label>Priority</label>
    <select id="card-priority">
      <option value="1">1 - Urgent</option>
      <option value="2">2 - Medium</option>
      <option value="3">3 - Low</option>
    </select>

    <label>Pillar</label>
    <select id="card-pillar"></select>

    <label>Points</label>
    <select id="card-points"></select>

    <label>Comments</label>
    <textarea id="card-comments" placeholder="Notes / comments..."></textarea>

    <div class="modal-actions">
      <button class="btn-delete-modal" id="modal-delete-btn" onclick="deleteFromModal()" style="display:none;">Delete</button>
      <div style="flex:1"></div>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<script>
  const PILLARS = ['Self Discipline', 'Learning', 'Working', 'Sport', 'Social'];

  let pillarScores = JSON.parse(localStorage.getItem('maxtrack-pillars')) || {
    'Self Discipline': 0, 'Learning': 0, 'Working': 0, 'Sport': 0, 'Social': 0
  };
  let cards = JSON.parse(localStorage.getItem('maxtrack-cards')) || [];
  let currentStatus = 'todo';
  let editingCardId = null;

  function renderPillars() {
    const container = document.getElementById('pillars-container');
    container.innerHTML = '';
    PILLARS.forEach(pillar => {
      const div = document.createElement('div');
      div.className = 'pillar-card';
      div.innerHTML = `
        <h3>${pillar}</h3>
        <div class="pillar-score">${pillarScores[pillar]}</div>
        <div class="pillar-buttons">
          <button onclick="changePillarScore('${pillar}', -5)">-5</button>
          <button onclick="changePillarScore('${pillar}', 5)">+5</button>
        </div>
      `;
      container.appendChild(div);
    });
    updateOverallScore();
  }

  function changePillarScore(pillar, delta) {
    pillarScores[pillar] = Math.max(0, pillarScores[pillar] + delta);
    localStorage.setItem('maxtrack-pillars', JSON.stringify(pillarScores));
    renderPillars();
  }

  function updateOverallScore() {
    const total = PILLARS.reduce((sum, p) => sum + pillarScores[p], 0);
    document.getElementById('score-value').textContent = total;
  }

  function populateSelects() {
    const pillarSelect = document.getElementById('card-pillar');
    pillarSelect.innerHTML = PILLARS.map(p => `<option value="${p}">${p}</option>`).join('');

    const pointsSelect = document.getElementById('card-points');
    let opts = '';
    for (let i = 5; i <= 50; i += 5) opts += `<option value="${i}">${i}</option>`;
    pointsSelect.innerHTML = opts;
  }

  function openModal(status) {
    editingCardId = null;
    currentStatus = status;
    document.getElementById('modal-title').textContent = 'New Card';
    document.getElementById('modal-delete-btn').style.display = 'none';
    document.getElementById('card-name').value = '';
    document.getElementById('card-desc').value = '';
    document.getElementById('card-due').value = '';
    document.getElementById('card-comments').value = '';
    document.getElementById('card-pillar').selectedIndex = 0;
    document.getElementById('card-points').selectedIndex = 0;
    document.getElementById('card-priority').selectedIndex = 0;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function openEditModal(id) {
    const card = cards.find(c => c.id === id);
    if (!card) return;
    editingCardId = id;
    currentStatus = card.status;
    document.getElementById('modal-title').textContent = 'Edit Card';
    document.getElementById('modal-delete-btn').style.display = 'inline-block';
    document.getElementById('card-name').value = card.name;
    document.getElementById('card-desc').value = card.desc || '';
    document.getElementById('card-due').value = card.due || '';
    document.getElementById('card-comments').value = card.comments || '';
    document.getElementById('card-pillar').value = card.pillar || PILLARS[0];
    document.getElementById('card-points').value = card.points || '5';
    document.getElementById('card-priority').value = card.priority || '1';
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editingCardId = null;
  }

  function saveCard() {
    const name = document.getElementById('card-name').value.trim();
    if (!name) { alert('Please enter a name'); return; }

    const data = {
      name,
      desc: document.getElementById('card-desc').value.trim(),
      due: document.getElementById('card-due').value,
      priority: document.getElementById('card-priority').value,
      pillar: document.getElementById('card-pillar').value,
      points: document.getElementById('card-points').value,
      comments: document.getElementById('card-comments').value.trim(),
    };

    if (editingCardId) {
      const card = cards.find(c => c.id === editingCardId);
      Object.assign(card, data);
    } else {
      cards.push({ id: Date.now().toString(), status: currentStatus, ...data });
    }

    saveCardsToStorage();
    renderCards();
    closeModal();
  }

  function deleteCard(id, event) {
    event.stopPropagation();
    cards = cards.filter(c => c.id !== id);
    saveCardsToStorage();
    renderCards();
  }

  function deleteFromModal() {
    if (editingCardId) {
      cards = cards.filter(c => c.id !== editingCardId);
      saveCardsToStorage();
      renderCards();
    }
    closeModal();
  }

  function saveCardsToStorage() {
    localStorage.setItem('maxtrack-cards', JSON.stringify(cards));
  }

  function renderCards() {
    ['todo', 'inprogress', 'done'].forEach(status => {
      document.getElementById(status + '-container').innerHTML = '';
    });

    cards.forEach(card => {
      const el = document.createElement('div');
      el.className = 'card';
      el.draggable = true;
      el.dataset.id = card.id;
      const priority = card.priority || '1';
      const priorityLabels = { '1': 'P1 Urgent', '2': 'P2 Medium', '3': 'P3 Low' };

      el.innerHTML = `
        <span class="delete-btn" onclick="deleteCard('${card.id}', event)">✕</span>
        <h3>${escapeHtml(card.name)}</h3>
        ${card.desc ? `<p class="desc">${escapeHtml(card.desc)}</p>` : ''}
        ${card.due ? `<div class="due">📅 ${card.due}</div>` : ''}
        <div class="meta-row">
          <span class="priority-tag priority-${priority}">${priorityLabels[priority]}</span>
          ${card.pillar ? `<span class="pillar-tag">${card.pillar}</span>` : ''}
          ${card.points ? `<span class="points-tag">${card.points} pts</span>` : ''}
        </div>
        ${card.comments ? `<div class="comments-count">💬 ${escapeHtml(card.comments).slice(0, 40)}${card.comments.length > 40 ? '...' : ''}</div>` : ''}
      `;

      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-btn')) return;
        openEditModal(card.id);
      });
      el.addEventListener('dragstart', () => el.classList.add('dragging'));
      el.addEventListener('dragend', () => el.classList.remove('dragging'));

      document.getElementById(card.status + '-container').appendChild(el);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.querySelectorAll('.column').forEach(column => {
    column.addEventListener('dragover', e => {
      e.preventDefault();
      column.classList.add('drag-over');
    });
    column.addEventListener('dragleave', () => column.classList.remove('drag-over'));
    column.addEventListener('drop', e => {
      e.preventDefault();
      column.classList.remove('drag-over');
      const dragging = document.querySelector('.dragging');
      if (!dragging) return;
      const id = dragging.dataset.id;
      const newStatus = column.dataset.status;
      const card = cards.find(c => c.id === id);
      if (card) {
        card.status = newStatus;
        saveCardsToStorage();
        renderCards();
      }
    });
  });

  populateSelects();
  renderPillars();
  renderCards();
</script>

</body>
</html>
